[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://gnews.io https://newsdata.io; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com;"

# Proxy NewsAPI requests (browser cannot call NewsAPI directly)
[[redirects]]
  from = "/api/news"
  to = "/.netlify/functions/news"
  status = 200

# SPA redirect - handle React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

